name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/hardware-deals
            git pull origin main
            /opt/hardware-deals/.venv/bin/pip install -r requirements.txt -q
            cp deploy/hardware-deals.service /etc/systemd/system/ 2>/dev/null || true
            systemctl daemon-reload
            systemctl enable hardware-deals 2>/dev/null || true
            systemctl restart hardware-deals
            sleep 2
            systemctl is-active hardware-deals
            echo "✅ hardware-deals deployed"
