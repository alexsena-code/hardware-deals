name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/hardware-deals
            git pull origin main
            /opt/hardware-deals/.venv/bin/pip install -r requirements.txt -q
            # Auto-migrate: add missing columns
            /opt/hardware-deals/.venv/bin/python -c "
from models.database import engine
from sqlalchemy import text, inspect
insp = inspect(engine)
cols = {c['name'] for c in insp.get_columns('search_items')}
with engine.begin() as conn:
    if 'scrape_enabled' not in cols:
        conn.execute(text('ALTER TABLE search_items ADD COLUMN scrape_enabled BOOLEAN DEFAULT true'))
        print('Added scrape_enabled column')
    else:
        print('scrape_enabled already exists')
" || echo "Migration skipped"
            cp deploy/hardware-deals.service /etc/systemd/system/ 2>/dev/null || true
            systemctl daemon-reload
            systemctl enable hardware-deals 2>/dev/null || true
            systemctl restart hardware-deals
            sleep 2
            systemctl is-active hardware-deals
            echo "✅ hardware-deals deployed"
