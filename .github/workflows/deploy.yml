name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/hardware-deals
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt -q
            pkill -f "python api.py" || true
            sleep 2
            nohup /opt/hardware-deals/.venv/bin/python /opt/hardware-deals/api.py > /opt/hardware-deals/api.log 2>&1 &
            disown
            sleep 1
            echo "✅ hardware-deals deployed (pid: $(pgrep -f 'python.*api.py'))"
