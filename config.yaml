sources:
  olx:
    enabled: true
    rate_limit_seconds: 2.0
    max_pages: 5
    # Search in multiple OLX categories to find misplaced deals
    search_paths:
      - "/informatica"           # Principal - placas de video, RAM, etc
      - "/informatica/pecas-para-computador"  # Peças avulso
      - ""                       # Busca geral (sem categoria)
    min_price: 400               # Ignora abaixo de R$400
  ebay:
    enabled: false
    rate_limit_seconds: 1.0
    max_pages: 3
