items:
  # === GPUs (vGPU unlock) ===
  - name: "GTX 1060 6GB"
    keywords: ["gtx 1060 6gb", "gtx1060 6gb"]
    max_price: 650
    category: gpu
    specs:
      vram_gb: 6
      tdp_w: 120
      cuda_cores: 1280

  - name: "GTX 1070"
    keywords: ["gtx 1070", "gtx1070"]
    max_price: 700
    category: gpu
    specs:
      vram_gb: 8
      tdp_w: 150
      cuda_cores: 1920

  - name: "GTX 1080 Ti"
    keywords: ["gtx 1080 ti", "gtx 1080ti", "1080ti"]
    max_price: 1200
    category: gpu
    specs:
      vram_gb: 11
      tdp_w: 250
      cuda_cores: 3584

  - name: "GTX 1660"
    keywords: ["gtx 1660"]
    max_price: 900
    category: gpu
    specs:
      vram_gb: 6
      tdp_w: 120
      cuda_cores: 1408

  - name: "RTX 2060"
    keywords: ["rtx 2060"]
    max_price: 1000
