  - name: "RTX 3060 12GB"
    keywords: ["rtx 3060 12gb", "rtx 3060"]
    max_price: 1600
    category: gpu
    specs:
      vram_gb: 12
      tdp_w: 170
      cuda_cores: 3584

  - name: "Tesla P40"
    keywords: ["tesla p40", "nvidia p40"]
    max_price: 3500
    category: gpu
    specs:
      vram_gb: 24
      tdp_w: 250
      cuda_cores: 3840

  # === Kits Xeon ===
  - name: "Kit Xeon E5 2680 v4"
    keywords: ["kit xeon e5 2680 v4", "e5 2680 v4 kit", "x99 2680"]
    max_price: 1900
    category: cpu-kit
    specs:
      cores: 14
      threads: 28
      base_clock_ghz: 2.4
      boost_clock_ghz: 3.3

  - name: "Kit Dual X99"
    keywords: ["dual x99", "placa mae dual xeon", "kit dual xeon"]
    max_price: 3000
    category: cpu-kit
    specs:
      cores: 28
      threads: 56
      base_clock_ghz: 2.4

  # === RAM ECC ===
  - name: "DDR4 ECC 16GB"
    keywords: ["ddr4 ecc 16gb", "memoria ecc 16gb"]
    max_price: 150
    category: ram
    specs:
      capacity_gb: 16
      type: "DDR4 ECC"

  - name: "DDR4 ECC 32GB"
    keywords: ["ddr4 ecc 32gb", "memoria ecc 32gb"]
    max_price: 300
    category: ram
    specs:
      capacity_gb: 32
      type: "DDR4 ECC"

